# Golden VM profiles. Copied to ~/.talos-lab/templates/vm-profiles.yaml on
# first run and owned by the user from then on -- edit the copy, not this file.
micro:
  cpu: 1
  memory: 2048
  disk: 10

small:
  cpu: 2
  memory: 4096
  disk: 20

medium:
  cpu: 4
  memory: 8192
  disk: 40

large:
  cpu: 8
  memory: 16384
  disk: 80
